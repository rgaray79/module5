<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Contact</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const a = document.createElement('a');
            a.href = 'index.html';
            a.className = 'return-link';
            a.textContent = '← Back to index';
            document.body.appendChild(a);
        });
    </script>
    <style>
        :root{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;line-height:1.4;color:#111}
        body{margin:0;padding:24px;background:#f6f7fb;display:flex;min-height:100vh;align-items:center;justify-content:center}
        .card{width:100%;max-width:700px;background:#fff;border-radius:10px;box-shadow:0 6px 30px rgba(20,20,50,.08);padding:24px}
        h1{margin:0 0 8px;font-size:1.25rem}
        p.lead{margin:0 0 18px;color:#555;font-size:0.95rem}
        form{display:grid;gap:12px}
        .row{display:flex;gap:12px}
        .row>div{flex:1}
        label{display:block;font-size:.85rem;margin-bottom:6px}
        input[type="text"],input[type="email"],input[type="tel"],select,textarea,input[type="file"]{
            width:100%;padding:10px;border:1px solid #d6d9e6;border-radius:6px;background:#fff;font-size:0.95rem;
        }
        textarea{min-height:120px;resize:vertical}
        .actions{display:flex;gap:8px;align-items:center}
        button{background:#0366d6;color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:600;cursor:pointer}
        button[disabled]{opacity:.6;cursor:default}
        .secondary{background:transparent;border:1px solid #d6d9e6;color:#111}
        .hint{font-size:.85rem;color:#6b7280}
        .status{padding:10px;border-radius:8px;font-size:.95rem}
        .success{background:#e6fffa;color:#065f46}
        .error{background:#ffebe6;color:#7b1e1e}
        @media (max-width:520px){.row{flex-direction:column}}
    </style>
</head>
<body>
    <main class="card" aria-labelledby="contactTitle">
        <h1 id="contactTitle">Contact Us</h1>
        <p class="lead">Send a message and we'll get back to you within 1–2 business days.</p>

        <form id="contactForm" action="#" method="post" novalidate>
            <div class="row">
                <div>
                    <label for="name">Full name</label>
                    <input id="name" name="name" type="text" placeholder="Your Name" required aria-required="true" />
                </div>
                <div>
                    <label for="phone">Phone (optional)</label>
                    <input id="phone" name="phone" type="tel" placeholder="+1 555 555 5555" />
                </div>
            </div>

            <div class="row">
                <div>
                    <label for="email">Email</label>
                    <input id="email" name="email" type="email" placeholder="you@example.com" required aria-required="true" />
                </div>
                <div>
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <option value="">Choose a subject</option>
                        <option>General inquiry</option>
                        <option>Support</option>
                        <option>Billing</option>
                        <option>Partnership</option>
                    </select>
                </div>
            </div>

            <div>
                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message..." required></textarea>
            </div>

            <div>
                <label for="attachment">Attachment (optional)</label>
                <input id="attachment" name="attachment" type="file" accept=".png,.jpg,.jpeg,.pdf,.txt" />
                <p class="hint">Max file size: 5MB</p>
            </div>

            <div style="display:flex;gap:10px;align-items:center">
                <input id="subscribe" name="subscribe" type="checkbox" />
                <label for="subscribe" style="margin:0">Subscribe to updates</label>
            </div>

            <div class="actions">
                <button type="submit" id="submitBtn">Send message</button>
                <button type="reset" class="secondary">Reset</button>
                <div id="status" role="status" aria-live="polite" style="margin-left:auto"></div>
            </div>
        </form>
    </main>

    <script>
        const form = document.getElementById('contactForm');
        const statusEl = document.getElementById('status');
        const submitBtn = document.getElementById('submitBtn');

        function showStatus(message, type){
            statusEl.textContent = message;
            statusEl.className = type ? 'status ' + type : '';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!form.checkValidity()){
                form.reportValidity();
                return;
            }
            submitBtn.disabled = true;
            showStatus('Sending...', '');
            // Simulate send (replace with real fetch to your backend)
            try {
                await new Promise(r => setTimeout(r, 900));
                showStatus('Message sent. Thank you!', 'success');
                form.reset();
            } catch (err) {
                showStatus('Failed to send message. Try again later.', 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
